<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SISF5 - Atendimento</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #f4fff8 0%, #e8fff1 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #103b25;
    }

    .container {
      width: 100%;
      max-width: 720px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
      padding: 32px 24px;
      text-align: center;
    }

    .logo {
      max-width: 100%;
      width: 420px;
      height: auto;
      margin: 0 auto 24px;
      display: block;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      color: #00b35a;
    }

    p {
      margin: 0;
      font-size: 18px;
      color: #355746;
    }

    /* 🔥 CENTRALIZA QUALQUER CONTAINER DO CHAT */
    .webchat-fab,
    [class*="webchat-fab"],
    #webchat-root,
    iframe[src*="webchat"] {
      position: fixed !important;
      top: 50% !important;
      left: 50% !important;
      right: auto !important;
      bottom: auto !important;
      transform: translate(-50%, -50%) !important;
      z-index: 9999 !important;
    }

    /* 🔥 ESTILIZA BOTÃO */
    .webchat-fab-button,
    [class*="webchat"] button {
      transform: scale(1.3);
      border-radius: 50px !important;
      animation: pulse 1.5s infinite;
    }

    /* 🔥 ANIMAÇÃO */
    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(0, 179, 90, 0.7);
      }
      70% {
        box-shadow: 0 0 0 20px rgba(0, 179, 90, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(0, 179, 90, 0);
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 24px 18px;
      }

      h1 {
        font-size: 26px;
      }

      p {
        font-size: 16px;
      }

      .logo {
        width: 100%;
        max-width: 320px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="logo.png" alt="Logo SISF5" class="logo" />
    <h1>Atendimento Online</h1>
    <p>Fale conosco agora mesmo</p>
  </div>

<script>
  window.WebchatChannelId = 'ce0b2f9d-8bbe-411b-8983-d7e8215ea6e9';

  function iniciar() {
    const s = document.createElement('script');

    // 🔥 força não usar cache
    s.src = 'https://sischat.sisf5.com.br/webchat-fab.js?v=' + Date.now();

    s.async = true;
    document.head.appendChild(s);
  }

  // 🔥 força reload limpo uma vez
  if (!sessionStorage.getItem('reloaded')) {
    sessionStorage.setItem('reloaded', 'true');
    location.reload();
  } else {
    iniciar();
  }
</script>
</body>
</html>
