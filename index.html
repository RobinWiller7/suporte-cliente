<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atendimento</title>
</head>
<body>
  <script>
    window.WebchatChannelId = '4y2+y1bcBt6c2K2HiCsJRCcgcmENyRDJSC1/oWF68cbM';

    function iniciar() {
      const s = document.createElement('script');
      s.src = 'https://4y2+y1bcBt6c2K2HiCsJRCcgcmENyRDJSC1/oWF68cbM/webchat-fab.js';
      s.async = true;

      s.onload = function () {
        const tentarAbrir = setInterval(function () {
          const btn = document.querySelector('.webchat-fab-button');
          if (btn) {
            btn.click();
            clearInterval(tentarAbrir);
          }
        }, 500);

        setTimeout(() => clearInterval(tentarAbrir), 10000);
      };

      document.head.appendChild(s);
    }

    window.onload = iniciar;
  </script>
</body>
</html>
