<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SISF5 - Atendimento</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e8fff1, #f4fff8);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
    }

    .logo {
      max-width: 320px;
      margin-bottom: 20px;
    }

    h1 {
      color: #00b35a;
      margin-bottom: 10px;
    }

    p {
      color: #444;
    }

    /* 🔥 BOTÃO DO CHAT CENTRAL */
    .webchat-fab-button {
      position: fixed !important;
      top: 50% !important;
      left: 50% !important;
      transform: translate(-50%, -50%) scale(1.2);
      z-index: 9999 !important;

      /* ANIMAÇÃO */
      animation: pulse 1.5s infinite;
      border-radius: 50px !important;
    }

    /* remove posição padrão */
    .webchat-fab {
      bottom: auto !important;
      right: auto !important;
    }

    /* 🔥 ANIMAÇÃO PULSAR */
    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(0, 179, 90, 0.7);
      }
      70% {
        box-shadow: 0 0 0 20px rgba(0, 179, 90, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(0, 179, 90, 0);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="logo.png" class="logo" />
    <h1>Atendimento Online</h1>
    <p>Estamos conectando você com nosso suporte...</p>
  </div>

  <script>
    // 🔑 COLOQUE SEU TOKEN AQUI
    window.WebchatChannelId = 'ce0b2f9d-8bbe-411b-8983-d7e8215ea6e9';

    function iniciar() {
      const s = document.createElement('script');
      s.src = 'https://sischat.sisf5.com.br/webchat-fab.js';
      s.async = true;

      s.onload = function () {
        const tentar = setInterval(() => {
          const btn = document.querySelector('.webchat-fab-button');

          if (btn) {
            clearInterval(tentar);

            // 🔥 ABRE AUTOMÁTICO (opcional)
            setTimeout(() => {
              btn.click();
            }, 1500);
          }
        }, 300);

        setTimeout(() => clearInterval(tentar), 10000);
      };

      document.head.appendChild(s);
    }

    window.onload = iniciar;
  </script>
</body>
</html>
